name: Linux AppImage

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
    - '*'

defaults:
  run:
    shell: bash

env:
  SOURCE_DIR:   ${{ github.workspace }}
  QT_VERSION:   6.5.1
  ARTIFACT:     LiniTunes.AppImage

jobs:
  build:
    runs-on:  ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt
        uses: jurplel/install-qt-action@v3.2.1
        with:
          version:      ${{ env.QT_VERSION }}
          host:         linux
          target:       desktop
          dir:          ${{ runner.temp }}
          modules:      qtcharts qt5compat qtshadertools
          setup-python: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 libxcb-cursor0 libusb-1.0-0-dev libssl-dev

      - name: Build idevice FFI
        run: |
          cd ${{ env.SOURCE_DIR }}/third_party/idevice
          cargo build --release -p idevice-ffi --features "usbmuxd,diagnostics_relay,pair"

      - name: Build LiniTunes
        run: |
          cmake -B ${{ env.SOURCE_DIR }}/build -S ${{ env.SOURCE_DIR }}/LiniTunes \
            -DCMAKE_PREFIX_PATH=${{ runner.temp }}/Qt/${{ env.QT_VERSION }}/gcc_64
          cmake --build ${{ env.SOURCE_DIR }}/build -j$(nproc)

      - name: Package AppImage
        working-directory: ${{ env.SOURCE_DIR }}/build
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:${{ runner.temp }}/Qt/${{ env.QT_VERSION }}/gcc_64/lib/
          export QMAKE=${{ runner.temp }}/Qt/${{ env.QT_VERSION }}/gcc_64/bin/qmake
          export QML_SOURCES_PATHS=${{ env.SOURCE_DIR }}/LiniTunes/
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -e LiniTunes \
            -i ${{ env.SOURCE_DIR }}/LiniTunes/images/linitunes.png \
            -d ${{ env.SOURCE_DIR }}/linux/linitunes.desktop \
            --plugin qt --output appimage
          mv LiniTunes*.AppImage ${{ env.ARTIFACT }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.SOURCE_DIR }}/build/${{ env.ARTIFACT }}