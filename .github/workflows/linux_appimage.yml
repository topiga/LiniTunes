name: Linux AppImage

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
    - '*'

defaults:
  run:
    shell: bash

env:
  SOURCE_DIR:   ${{ github.workspace }}
  QT_VERSION:   6.11.1
  ARTIFACT:     LiniTunes.AppImage

jobs:
  build:
    runs-on:  ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version:      ${{ env.QT_VERSION }}
          host:         linux
          target:       desktop
          dir:          ${{ runner.temp }}
          modules:      qtcharts qt5compat qtshadertools qtwaylandcompositor
          setup-python: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 libxcb-cursor0 libusb-1.0-0-dev libssl-dev

      - name: Build idevice FFI
        run: |
          cd ${{ env.SOURCE_DIR }}/third_party/idevice
          cargo build --release -p idevice-ffi --features "usbmuxd,diagnostics_relay,pair,afc,installation_proxy,mobilebackup2"

      - name: Build LiniTunes
        run: |
          cmake -B ${{ env.SOURCE_DIR }}/build -S ${{ env.SOURCE_DIR }}/LiniTunes \
            -DCMAKE_PREFIX_PATH=${{ runner.temp }}/Qt/${{ env.QT_VERSION }}/gcc_64
          cmake --build ${{ env.SOURCE_DIR }}/build -j$(nproc)

      - name: Package AppImage
        working-directory: ${{ env.SOURCE_DIR }}/build
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export QT_ROOT=${{ runner.temp }}/Qt/${{ env.QT_VERSION }}/gcc_64
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$QT_ROOT/lib/
          export QMAKE=$QT_ROOT/bin/qmake
          export QML_SOURCES_PATHS=${{ env.SOURCE_DIR }}/LiniTunes/
          export EXTRA_QT_MODULES="waylandcompositor"
          export EXTRA_PLATFORM_PLUGINS="libqwayland.so"

          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -e LiniTunes \
            -i ${{ env.SOURCE_DIR }}/LiniTunes/images/linitunes.png \
            -d ${{ env.SOURCE_DIR }}/linux/linitunes.desktop \
            --plugin qt

          # Qt Quick Dialogs' non-native FolderDialog imports this module at runtime,
          # but linuxdeploy's QML scanner can miss that transitive dependency.
          if [ ! -d AppDir/usr/qml/Qt/labs/folderlistmodel ]; then
            mkdir -p AppDir/usr/qml/Qt/labs
            cp -a "$QT_ROOT/qml/Qt/labs/folderlistmodel" AppDir/usr/qml/Qt/labs/
          fi
          test -d AppDir/usr/qml/Qt/labs/folderlistmodel

          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          mv LiniTunes*.AppImage ${{ env.ARTIFACT }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.SOURCE_DIR }}/build/${{ env.ARTIFACT }}